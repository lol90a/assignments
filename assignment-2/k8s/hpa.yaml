apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: certificate-api
  namespace: certificate-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: certificate-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # CPU utilization is a portable baseline signal; production systems usually
    # add request latency or queue-depth metrics for certificate workflows.
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
