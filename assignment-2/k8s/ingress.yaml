apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: certificate-api
  namespace: certificate-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "64k"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - certificates.example.com
      secretName: certificate-api-tls
  rules:
    - host: certificates.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: certificate-api
                port:
                  number: 8080
